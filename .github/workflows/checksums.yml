name: Regenerate Checksums

on:
  push:
    branches: [main]
    paths:
      - 'modules/**/*.sh'
      - 'modules/**/*.list'
      - 'menu.sh'

jobs:
  checksums:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate modules.sha256
        run: |
          cd modules
          rm -f modules.sha256
          for f in $(find . -name '*.sh' -o -name '*.list' | sed 's|^\./||' | sort); do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            printf '%s *%s\n' "$hash" "$f" >> modules.sha256
          done
          echo "Generated $(wc -l < modules.sha256) checksum entries"

      - name: Import GPG key for signed commits
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit and push if changed
        run: |
          git add modules/modules.sha256
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: auto-regenerate modules.sha256"
            git push
          fi
